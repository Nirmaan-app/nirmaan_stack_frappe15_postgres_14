name: Build and Push nirmaan_stack
on:
  push:
    tags:
    - '*'
  # workflow_dispatch:

jobs:
  clone-repo: 
    runs-on: ubuntu-latest

    steps:
    - name: Check out my other private repo
      uses: actions/checkout@v4
      with:
        repository: Nirmaan-app/frappe_docker
        # token: ${{ secrets.NIRMAAN_ADMIN_PAT }}
    - name: Set env
      run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
    - name: Create Apps.json
      run: |
        export APPS_JSON='[
          {
            "url": "https://github.com/Nirmaan-app/nirmaan_stack_frappe15_postgres_14.git",
            "branch": "${{ env.RELEASE_VERSION }}"
          },
          {
            "url": "https://github.com/Nirmaan-app/Frappe-attachments-s3.git",
            "branch": "master"
          }
        ]'
        echo "APPS_JSON_BASE64=$(echo ${APPS_JSON} | base64 -w 0)" >> $GITHUB_ENV
        echo "FCM SECRET: ${{ secrets.FCM_ACCESS }}"
    - name: Force pyOpenSSL >= 26.2.0 (Frappe pins broken 26.0.0)
      run: |
        set -euo pipefail
        CF=images/layered/Containerfile
        test -f "$CF"
        printf '\n' >> "$CF"
        cat >> "$CF" <<'EOF'
        # Fix: Frappe pins pyOpenSSL~=26.0.0, but 26.0.0's deprecated
        # X509Extension eagerly reads _lib.GEN_EMAIL (removed from cryptography),
        # so `import boto3` (urllib3.contrib.pyopenssl -> OpenSSL.crypto) crashes
        # at module load and kills `bench new-site`. Force >=26.2.0 (drops the
        # eager lookup) and self-verify so the build fails HERE if it ever breaks.
        RUN /home/frappe/frappe-bench/env/bin/pip install --upgrade --no-cache-dir "pyOpenSSL>=26.2.0" \
          && /home/frappe/frappe-bench/env/bin/python -c "import boto3, OpenSSL.version; print('pyOpenSSL OK:', OpenSSL.version.__version__)"
        EOF
        grep -q 'pyOpenSSL>=26.2.0' "$CF" || { echo "::error::pyOpenSSL patch not appended"; exit 1; }
        echo '----- tail of patched Containerfile -----'
        tail -n 12 "$CF"
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to GAR
      uses: docker/login-action@v3
      with:
        registry: asia-south1-docker.pkg.dev
        username: _json_key
        password: ${{ secrets.GAR_JSON_KEY }}
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: images/layered/Containerfile
        platforms: linux/amd64
        push: true
        tags: asia-south1-docker.pkg.dev/nirmaan-stack/nirmaan-project-stack/nirmaan-project-stack:${{ env.RELEASE_VERSION }}
        secrets: |
          "FCM_ACCESS=${{ secrets.FCM_ACCESS }}"
        build-args: |
          FRAPPE_PATH=https://github.com/frappe/frappe
          FRAPPE_BRANCH=v15.107.0
          APPS_JSON_BASE64=${{ env.APPS_JSON_BASE64 }}
          
          
      
      
